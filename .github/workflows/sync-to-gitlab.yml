name: Sync to GitLab

on:
  # 定时触发：每天凌晨 2 点同步一次
  schedule:
    - cron: '0 2 * * *'
  # 手动触发：可以在 GitHub Actions 页面手动运行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库（你的 GitHub fork）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，包括所有分支
          
      # 2. 添加原作者仓库作为 upstream
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/spring-ai-alibaba/DataAgent.git
          git fetch upstream
          
      # 3. 配置 Git 用户信息
      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
      # 4. 获取当前分支名（main 或 master）
      - name: Get default branch
        id: branch
        run: |
          BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
      # 5. 合并上游更新
      - name: Merge upstream changes
        run: |
          git checkout ${{ steps.branch.outputs.branch }}
          git merge upstream/${{ steps.branch.outputs.branch }} --no-edit || true
          
      # 6. 推送更新到 GitLab（使用 SSH）
      - name: Push to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@gitlab.com:你的用户名/DataAgent.git
          ssh_private_key:
            ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
