name: Sync to GitLab (Self-hosted)

on:
  schedule:
    - cron: '0 2 * * *'   # 每天凌晨 2 点执行
  workflow_dispatch:       # 支持手动触发

jobs:
  sync:
    runs-on: self-hosted   # 使用内网的自托管 runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/spring-ai-alibaba/DataAgent.git
          git fetch upstream

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Get default branch
        id: branch
        run: |
          BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Merge upstream changes
        run: |
          git checkout ${{ steps.branch.outputs.branch }}
          git merge upstream/${{ steps.branch.outputs.branch }} --no-edit || true

      - name: Push to GitLab (using SSH)
        run: |
          # 添加 GitLab 为远程仓库（SSH 方式）
          git remote add gitlab git@192.168.0.200:zwxt-product-group/deploy/dataagent.git
          git push gitlab ${{ steps.branch.outputs.branch }} --force-with-lease
